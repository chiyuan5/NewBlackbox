name: Build Bcore AAR

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'Bcore/**'
      - 'black-reflection/**'
      - 'compiler/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - '.github/workflows/build-bcore-aar.yml'
  pull_request:
    paths:
      - 'Bcore/**'
      - 'black-reflection/**'
      - 'compiler/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'

jobs:
  build-aar:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle caching
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure gradlew is executable
        run: chmod +x ./gradlew

      - name: Install Android SDK / NDK packages
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;29.0.13846066"

      - name: Build Bcore release AAR
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: ./gradlew :Bcore:assembleRelease --stacktrace --no-daemon

      - name: Upload Bcore AAR
        uses: actions/upload-artifact@v4
        with:
          name: Bcore-release-aar
          path: Bcore/build/outputs/aar/*.aar
          if-no-files-found: error
